<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal blog and portfolio of Hasan Al Doy">
  <meta name="theme-color" content="#ffffff">
  <title>All Posts - Hasan Al Doy</title>
  <link rel="stylesheet" href="static/style.css">
  <link rel="canonical" href="https://aldoyh.github.io/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <a href="#main-content" class="sr-only">Skip to main content</a>

  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a href="index.html" class="logo">Hasan Al Doy</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html" class="nav-link">Home</a>
        <a href="posts.html" class="nav-link">Posts</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <span aria-hidden="true" style="font-size:1.2rem;">☼</span>
        </button>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1 class="hero-title">Software Engineer Guru</h1>
      <p class="hero-subtitle">Sharing insights on web development, engineering, and architecture.</p>
    </div>
  </section>

  <main id="main-content" class="container">
    <section id="recent-posts" class="recent-posts">
      <div class="section-header">
        <h2 class="section-title">Latest Articles</h2>
        
      </div>
      <ul id="posts-list" class="posts-list" role="list">--><!--
        
      -->
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <div class="footer-links">
        <a href="https://github.com/aldoyh" rel="noopener noreferrer" target="_blank">GitHub</a>
        <a href="https://twitter.com/aldoyh" rel="noopener noreferrer" target="_blank">Twitter</a>
        <a href="mailto:aldoyh@gmail.com">Email</a>
      </div>
      <p style="margin-top:1rem; opacity:0.6;">&copy; <span id="year"></span> Hasan Al Doy. All rights reserved.</p>
    </div>
  </footer>

  <script>
    // Dark mode logic
    const toggle = document.getElementById('theme-toggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
    const html = document.documentElement;
    
    function setTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      toggle.innerHTML = theme === 'dark' ? '<span aria-hidden="true" style="font-size:1.2rem;">☼</span>' : '<span aria-hidden="true" style="font-size:1.2rem;">☾</span>';
    }
    
    // Init
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      setTheme(savedTheme);
    } else if (prefersDark.matches) {
      setTheme('dark');
    }
    
    toggle.addEventListener('click', () => {
      const current = document.body.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
